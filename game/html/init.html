<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="author" content="Lionel Garnier, Université de Bourgogne">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowling 3D - Modernized</title>

    <!-- Dependencies -->
    <script type="text/javascript" charset="UTF-8" src="../../libs/three/three.js"></script>
    <script type="text/javascript" charset="UTF-8" src="../../libs/other/physijs/physi.js"></script>
    <script type="text/javascript" charset="UTF-8" src="../../libs/other/ThreeBSP.js"></script>
    <script type="text/javascript" charset="UTF-8" src="../../libs/three/controls/TrackballControls.js"></script>
    <script type="text/javascript" src="../../libs/util/dat.gui.js"></script>
    <script type="text/javascript" src="../../libs/util/Stats.js"></script>
    <script type="text/javascript" src="../../libs/util/util.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0e1a;
            font-family: 'Inter', sans-serif;
            color: white;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #webgl {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Glassmorphism UI */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
            /* Let clicks pass through */
        }

        .interactive {
            pointer-events: auto;
        }

        /* Start Menu Overlay */
        #start-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 14, 26, 0.95);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        
        .menu-container {
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 40px;
            width: 400px;
            text-align: center;
        }
        
        .menu-title {
            font-size: 32px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: #fff;
        }
        
        .menu-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        .menu-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .option-btn {
            flex: 1;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .option-btn.selected {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .range-slider {
            width: 100%;
            margin-bottom: 5px;
        }
        
        .range-val {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #fff;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #fff;
            border: 1px solid #fff;
            border-radius: 4px;
            color: #000;
            font-family: inherit;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .start-btn:hover {
            background: #ddd;
        }

        /* Overhead Scoreboard */
        #overhead-scoreboard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            border-bottom: 1px solid #333;
            display: none; /* Hidden until start */
            flex-direction: column;
            padding: 5px 20px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            z-index: 200;
            transform: scale(0.85);
            transform-origin: top center;
        }

        .team-row {
            display: flex;
            align-items: center;
            margin: 2px 0;
        }

        .team-name {
            width: 80px;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .cyan-team .team-name {
            color: #00e5ff;
        }

        .red-team .team-name {
            color: #ff0022;
        }

        .frames {
            display: flex;
            flex: 1;
            gap: 5px;
        }

        .frame {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .frame-header {
            text-align: center;
            font-size: 10px;
            color: #aaa;
            background: #222;
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }

        .frame-throws {
            display: flex;
            height: 20px;
            border-bottom: 1px solid #333;
        }

        .throw-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            border-right: 1px solid #333;
        }

        .throw-box:last-child {
            border-right: none;
        }

        .frame-score {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            padding: 5px 0;
        }

        .total-score {
            width: 80px;
            text-align: right;
            font-size: 24px;
            font-weight: 800;
        }

        /* Announcement Banner */
        #announce-banner {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 300;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        #announce-banner.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        #announce-text {
            font-size: 80px;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
        }

        .strike-text {
            color: #ffd700 !important;
        }

        .spare-text {
            color: #00e5ff !important;
        }

        .open-text {
            color: #ffffff !important;
        }
    </style>
</head>

<body>

    <div id="start-menu">
        <div class="menu-container">
            <h1 class="menu-title">PRO BOWLING</h1>
            
            <div class="menu-group">
                <span class="menu-label">Players</span>
                <div class="btn-group">
                    <button class="option-btn" id="btn-1p" onclick="selectPlayers(1)">1 Player</button>
                    <button class="option-btn selected" id="btn-2p" onclick="selectPlayers(2)">2 Players</button>
                </div>
            </div>

            <div class="menu-group">
                <span class="menu-label">Rounds (Frames)</span>
                <input type="range" id="rounds-slider" class="range-slider" min="1" max="10" value="10" oninput="updateRounds(this.value)">
                <div class="range-val" id="rounds-val">10</div>
            </div>

            <button class="start-btn" onclick="startClicked()">PLAY NOW</button>
        </div>
    </div>

    <!-- UI -->
    <div class="ui-layer interactive">
        <div id="overhead-scoreboard">
            <div class="team-row cyan-team" id="row-cyan">
                <div class="team-name">CYAN</div>
                <div class="frames" id="cyan-frames"></div>
                <div class="total-score" id="cyan-total">0</div>
            </div>
            <div class="team-row red-team" id="row-red">
                <div class="team-name">RED</div>
                <div class="frames" id="red-frames"></div>
                <div class="total-score" id="red-total">0</div>
            </div>
        </div>

        <div id="announce-banner">
            <h1 id="announce-text">STRIKE!</h1>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="webgl"></div>

    <script>
        let selectedPlayers = 2;
        let selectedRounds = 10;

        function selectPlayers(p) {
            selectedPlayers = p;
            document.getElementById('btn-1p').classList.remove('selected');
            document.getElementById('btn-2p').classList.remove('selected');
            document.getElementById(`btn-${p}p`).classList.add('selected');
        }

        function updateRounds(v) {
            selectedRounds = parseInt(v);
            document.getElementById('rounds-val').innerText = selectedRounds;
        }

        function startClicked() {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('overhead-scoreboard').style.display = 'flex';
            
            if (typeof initGame === 'function') {
                initGame(selectedPlayers, selectedRounds);
            }
        }
    </script>

    <!-- Game Logic Scripts (Strict Ordering) -->
    <script src="../js/Score.js?v=13"></script>
    <script src="../js/cameraLight.js?v=13"></script>
    <script src="../js/ball.js?v=13"></script>
    <script src="../js/animation.js?v=13"></script>
    <script src="../js/pin.js?v=13"></script>
    <script src="../js/init.js?v=13"></script>

</body>

</html>
