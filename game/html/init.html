<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="author" content="Lionel Garnier, Université de Bourgogne">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowling 3D - Modernized</title>
    
    <!-- Dependencies -->
    <script type="text/javascript" charset="UTF-8" src="../../libs/three/three.js"></script>
    <script type="text/javascript" charset="UTF-8" src="../../libs/other/physijs/physi.js"></script>
    <script type="text/javascript" charset="UTF-8" src="../../libs/other/ThreeBSP.js"></script>
    <script type="text/javascript" charset="UTF-8" src="../../libs/three/controls/TrackballControls.js"></script>
    <script type="text/javascript" src="../../libs/util/dat.gui.js"></script>
    <script type="text/javascript" src="../../libs/util/Stats.js"></script>
    <script type="text/javascript" src="../../libs/util/util.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0e1a;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        #webgl {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Glassmorphism UI */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through */
        }
        
        .interactive {
            pointer-events: auto;
        }

        /* Overhead Scoreboard */
        #overhead-scoreboard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 5px 20px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            z-index: 200;
            transform: scale(0.85);
            transform-origin: top center;
        }

        .team-row {
            display: flex;
            align-items: center;
            margin: 2px 0;
        }

        .team-name {
            width: 80px;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .cyan-team .team-name { color: #00e5ff; }
        .orange-team .team-name { color: #ff5500; }

        .frames {
            display: flex;
            flex: 1;
            gap: 5px;
        }

        .frame {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .frame-header {
            text-align: center;
            font-size: 10px;
            color: #888;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .frame-throws {
            display: flex;
            height: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .throw-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .throw-box:last-child { border-right: none; }

        .frame-score {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            padding: 5px 0;
        }

        .total-score {
            width: 80px;
            text-align: right;
            font-size: 24px;
            font-weight: 800;
        }

        /* Announcement Banner */
        #announce-banner {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            pointer-events: none;
            z-index: 300;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        #announce-banner.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        #announce-text {
            font-size: 80px;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            -webkit-text-stroke: 2px rgba(255,255,255,0.2);
        }

        .strike-text { color: #ffd700; }
        .spare-text { color: #00e5ff; }
        .open-text { color: #ffffff; }

        /* Controls positioning */
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none !important;
        }
        
        #gauche {
            position: absolute;
            bottom: 60px;
            left: 25%;
            transform: translateX(-50%);
            background-color: #00e5ff;
            color: #0a0e1a;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            z-index: 100;
        }

        #gauche:hover:not(:disabled) {
            background-color: #00b3cc;
            transform: translate(-50%, -2px);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        #droite {
            position: absolute;
            bottom: 60px;
            right: 25%;
            transform: translateX(50%);
            background-color: #ff5500;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.3);
            z-index: 100;
        }

        #droite:hover:not(:disabled) {
            background-color: #cc4400;
            transform: translate(50%, -2px);
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.5);
        }

    </style>
</head>

<body onload="init()">

    <!-- UI -->
    <div class="ui-layer interactive">
        
        <div id="overhead-scoreboard">
            <div class="team-row cyan-team">
                <div class="team-name">CYAN</div>
                <div class="frames" id="cyan-frames"></div>
                <div class="total-score" id="cyan-total">0</div>
            </div>
            <div class="team-row orange-team">
                <div class="team-name">ORANGE</div>
                <div class="frames" id="orange-frames"></div>
                <div class="total-score" id="orange-total">0</div>
            </div>
        </div>

        <div id="announce-banner">
            <h1 id="announce-text">STRIKE!</h1>
        </div>

        <!-- Cameras removed per request -->

        <div>
            <button id="gauche" class="btn" onclick="change_pos(1)">THROW</button>
            <button id="droite" class="btn" onclick="change_pos(2)">THROW</button>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="webgl"></div>

    <!-- Game Logic Scripts (Strict Ordering) -->
    <script src="../js/Score.js?v=2"></script>
    <script src="../js/CameraLumiere.js?v=2"></script>
    <script src="../js/boule.js?v=2"></script>
    <script src="../js/animation.js?v=2"></script>
    <script src="../js/quille.js?v=2"></script>
    <script src="../js/lignes_courbes.js?v=2"></script>
    <script src="../js/Aleatoire.js?v=2"></script>
    <script src="../js/init.js?v=2"></script>

</body>
</html>
